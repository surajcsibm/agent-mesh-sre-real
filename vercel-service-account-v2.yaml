apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-mesh-vercel
  namespace: confluent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-mesh-vercel-role
  namespace: confluent
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["demo-consumer"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    resourceNames: ["demo-consumer"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["demo-producer"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  # New: exec into the three named Kafka broker pods ONLY — needed for
  # kafka-share-groups --describe, which has no equivalent in KafkaJS's
  # Admin API (confirmed: zero share-group methods exist in the library).
  # Scoped to exact pod names, not a namespace-wide grant.
  - apiGroups: [""]
    resources: ["pods/exec"]
    resourceNames: ["kafka-0", "kafka-1", "kafka-2"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-mesh-vercel-binding
  namespace: confluent
subjects:
  - kind: ServiceAccount
    name: agent-mesh-vercel
    namespace: confluent
roleRef:
  kind: Role
  name: agent-mesh-vercel-role
  apiGroup: rbac.authorization.k8s.io
